<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>総武線すごろく | ぴったりゴール演出版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 10px; overflow-x: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            color: #333; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #menu-container {
            background: rgba(255,255,255,0.9);
            margin-bottom: 10px; padding: 15px;
            border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 10px;
        }

        #dice-box { display: flex; flex-direction: column; align-items: center; }
        #diceImg { width: 80px; height: 80px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 8px; }
        
        #controls { text-align: left; font-size: 0.9rem; line-height: 1.6; }

        button { padding: 10px 20px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        #diceBtn { background: #FFD700; box-shadow: 0 4px #b89b00; width: 100%; font-size: 1.1rem; }
        #resetBtn { background: #ff6b6b; color: white; width: 100%; margin-top: 8px; box-shadow: 0 4px #c94c4c; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background: #ccc; box-shadow: none; }

        #board-container { width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        #board {
            width: 100%; height: 530px; position: relative;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #FFD700; border-radius: 20px; overflow: hidden;
        }

        .rail-line {
            position: absolute; background: #FFD700; height: 4px;
            z-index: 1; transform-origin: left center; opacity: 0.5;
        }

        .station {
            position: absolute; width: 22%; height: 40px; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; border-radius: 8px; font-weight: bold;
            border: 2px solid #FFD700; z-index: 10; transition: background 0.3s;
        }

        .station.current-station { background: #FFD700 !important; box-shadow: 0 0 10px #FFD700; z-index: 20; }

        #marker {
            position: absolute; width: 18%; height: auto;
            transition: all 0.5s ease-in-out;
            z-index: 100; pointer-events: none;
        }
        #trainImg { width: 100%; height: auto; }

        /* 雲を復活させたよ！ */
        .cloud {
            position: fixed; background: #fff; border-radius: 50px;
            opacity: 0.8; z-index: -1; animation: moveClouds linear infinite;
        }
        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }
    </style>
</head>
<body>
    <div id="cloudsContainer"></div>
    <div id="menu-container">
        <div id="dice-box">
            <img id="diceImg" src="sugo_01.jpg">
            <button id="diceBtn">振る！</button>
        </div>
        <div id="controls">
            <span>🚉 出発：</span><select id="startStationSelect"></select><br>
            <span>📍 いま：</span><span id="currentStation" style="font-weight:bold;">西荻窪</span><br>
            <button id="resetBtn">最初に戻る</button>
        </div>
    </div>

    <div id="board-container">
        <div id="board">
            <div id="marker"><img id="trainImg" src="soubu.png"></div>
        </div>
    </div>

    <script>
        const stations = ["西荻窪","荻窪","阿佐ヶ谷","高円寺","中野","東中野","大久保","新宿","代々木","千駄ヶ谷","信濃町","四ツ谷","市ヶ谷","飯田橋","水道橋","御茶ノ水","秋葉原","浅草橋","両国","錦糸町","亀戸","平井","新小岩","小岩"];
        const board = document.getElementById("board");
        const select = document.getElementById("startStationSelect");
        
        let position = parseInt(localStorage.getItem("sobu_pos")) || 0;
        let startPosition = parseInt(localStorage.getItem("sobu_start")) || 0;
        let isMoving = false;

        const stationElements = [];
        stations.forEach((name, i) => {
            const div = document.createElement("div");
            div.className = "station";
            div.textContent = name;
            const cols = 4;
            const row = Math.floor(i / cols);
            const col = i % cols;
            let left = (row % 2 === 0) ? (5 + col * 23) : (5 + (3 - col) * 23);
            let top = 20 + (row * 70);
            div.style.left = left + "%";
            div.style.top = top + "px";
            board.appendChild(div);
            stationElements.push({ el: div, x: left, y: top });

            const opt = document.createElement("option");
            opt.value = i; opt.textContent = name;
            if (i === startPosition) opt.selected = true;
            select.appendChild(opt);
        });

        for (let i = 0; i < stationElements.length - 1; i++) {
            const s1 = stationElements[i];
            const s2 = stationElements[i+1];
            const line = document.createElement("div");
            line.className = "rail-line";
            const x1 = s1.x + 11; const y1 = s1.y + 20;
            const x2 = s2.x + 11; const y2 = s2.y + 20;
            const dist = Math.sqrt(Math.pow((x2-x1)*4, 2) + Math.pow(y2-y1, 2));
            const angle = Math.atan2(y2 - y1, (x2 - x1) * 4) * 180 / Math.PI;
            line.style.width = dist + "px";
            line.style.left = x1 + "%";
            line.style.top = y1 + "px";
            line.style.transform = `rotate(${angle}deg)`;
            board.appendChild(line);
        }

        async function moveOneByOne(steps) {
            isMoving = true;
            diceBtn.disabled = true;
            
            const totalStations = stations.length;
            let actualStepsTaken = 0;

            for (let i = 0; i < steps; i++) {
                if (position >= totalStations - 1) break;
                position++;
                actualStepsTaken++;
                updateMarker();
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // ★ぴったりゴールの判定演出
            if (position === totalStations - 1) {
                if (actualStepsTaken === steps) {
                    // ぴったりゴールの豪華演出！
                    var duration = 3 * 1000;
                    var end = Date.now() + duration;
                    (function frame() {
                      confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD700', '#FFA500'] });
                      confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD700', '#FFA500'] });
                      if (Date.now() < end) { requestAnimationFrame(frame); }
                    }());
                } else {
                    // 普通のゴール
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
            
            localStorage.setItem("sobu_pos", position);
            isMoving = false;
            diceBtn.disabled = false;
        }

        function updateMarker() {
            const marker = document.getElementById("marker");
            const stationDivs = document.querySelectorAll(".station");
            stationDivs.forEach((d, i) => {
                if(i === position) d.classList.add("current-station");
                else d.classList.remove("current-station");
            });
            const target = stationElements[position];
            document.getElementById("currentStation").textContent = stations[position];
            marker.style.left = (target.x + 2) + "%";
            marker.style.top = (target.y - 25) + "px";
        }

        select.addEventListener("change", (e) => {
            if (isMoving) return;
            position = startPosition = parseInt(e.target.value);
            localStorage.setItem("sobu_start", startPosition);
            updateMarker();
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
            if (isMoving) return;
            position = startPosition;
            updateMarker();
        });

        const diceBtn = document.getElementById("diceBtn");
        const diceImg = document.getElementById("diceImg");

        diceBtn.addEventListener("click", () => {
            if (isMoving || position >= stations.length - 1) return;
            diceBtn.disabled = true;
            let count = 0;
            const roll = setInterval(() => {
                diceImg.src = `sugo_0${Math.floor(Math.random() * 6) + 1}.jpg`;
                count++;
                if (count > 10) {
                    clearInterval(roll);
                    const dice = Math.floor(Math.random() * 6) + 1;
                    diceImg.src = `sugo_0${dice}.jpg`;
                    moveOneByOne(dice);
                }
            }, 80);
        });

        // 雲の生成を確実に実行
        const cloudsContainer = document.getElementById("cloudsContainer");
        for (let i = 0; i < 6; i++) {
            const c = document.createElement("div");
            c.className = "cloud";
            c.style.width = (Math.random()*120+80)+"px";
            c.style.height = (Math.random()*40+30)+"px";
            c.style.top = (Math.random()*40)+"vh";
            c.style.left = "-200px";
            c.style.animationDuration = (Math.random()*25+15)+"s";
            c.style.animationDelay = (Math.random()*20)+"s";
            cloudsContainer.appendChild(c);
        }

        updateMarker();
    </script>
</body>
</html>
